{% extends "base.html" %}
{% block content %}
<main class="container content-page">
  <h2>Admin Panel</h2>
  <div class="listings">
    {% for l in listings %}
      <div class="listing"><h4>{{ l['title'] }} - {{ l['quantity'] }} qty</h4><p>{{ l['description'] }}</p><p>Pickup: {{ l['pickup_address'] }}</p><p>Status: {{ l['status'] }}</p></div>
    {% else %}
      <p>No listings.</p>
    {% endfor %}
  </div>
</main>
{% endblock %}
